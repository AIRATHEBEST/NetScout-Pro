services:
  # ─── FastAPI Backend ───────────────────────────────────────
  - type: web
    name: netscout-pro-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false   # Set manually: Supabase > Settings > Database > Connection string
      - key: SUPABASE_URL
        value: https://jqteahtqwffjenserypk.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false   # Set manually: Supabase > Settings > API > service_role key
      - key: REDIS_URL
        sync: false   # Set manually: paste your Upstash Redis URL here
      - key: AGENT_TOKEN
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        value: "*"

  # ─── React Frontend ────────────────────────────────────────
  - type: web
    name: netscout-pro-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: starter
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
